name: FlyBy
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^16.1.0
  dio: ^5.9.2
  google_fonts: ^6.3.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.0
  connectivity_plus: ^6.0.0
  shared_preferences: ^2.3.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.0

flutter:

  uses-material-design: true

  assets:
    - assets/icons/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/flyby_app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: "assets/icons/flyby_app_icon.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#3B82F6"
  image: "assets/icons/splash_icon.png"
  android_12:
    color: "#3B82F6"
    image: "assets/icons/splash_icon.png"
  
